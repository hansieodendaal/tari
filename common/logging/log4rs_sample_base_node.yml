# A sample log configuration file for running in release mode. By default, this configuration splits up log messages to
# three destinations:
#    * Console: For log messages with level INFO and higher
#    * log/network.log: INFO-level logs related to the comms crate. This file will be quite busy since there
#      are lots of P2P debug messages, and so this traffic is segregated from the application log messages
#    * log/base_layer.log: Non-comms related INFO-level messages and higher are logged into this file
#    * log/other.log: Third-party crates' messages will be logged here at an ERROR level
#
#  See https://docs.rs/log4rs/0.8.3/log4rs/encode/pattern/index.html for deciphering the log pattern. The log format
#  used in this sample configuration prints messages as:
#  timestamp [target] LEVEL message
refresh_rate: 30 seconds
appenders:
  # An appender named "stdout" that writes to stdout
  stdout:
    kind: console
    encoder:
      pattern: "{d(%Y-%m-%d %H:%M:%S.%f)} [{t}] {h({l}):5} {m}{n}"

  # An appender named "network" that writes to a file with a custom pattern encoder
  network:
    kind: rolling_file
    path: "log/base-node/network.log"
    policy:
      kind: compound
      trigger:
        kind: size
        limit: 200mb
      roller:
        kind: fixed_window
        base: 1
        count: 100
        pattern: "log/base-node/network.{}.log"
    encoder:
      pattern: "{d(%Y-%m-%d %H:%M:%S.%f)} [{t}] {l:5} {m}{n}"

  # An appender named "core" that writes to a file with a custom pattern encoder
  core:
    kind: rolling_file
    path: "log/base-node/core.log"
    policy:
      kind: compound
      trigger:
        kind: size
        limit: 200mb
      roller:
        kind: fixed_window
        base: 1
        count: 50
        pattern: "log/base-node/core.{}.log"
    encoder:
      pattern: "{d(%Y-%m-%d %H:%M:%S.%f)} [{t}] {l:5} {m}{n}"

  # An appender named "base_layer" that writes to a file with a custom pattern encoder
  base_layer:
    kind: rolling_file
    path: "log/base-node/base_layer.log"
    policy:
      kind: compound
      trigger:
        kind: size
        limit: 200mb
      roller:
        kind: fixed_window
        base: 1
        count: 50
        pattern: "log/base-node/base_layer.{}.log"
    encoder:
      pattern: "{d(%Y-%m-%d %H:%M:%S.%f)} [{t}] {l:5} {m}{n}"

  # An appender named "other" that writes to a file with a custom pattern encoder
  other:
    kind: rolling_file
    path: "log/base-node/other.log"
    policy:
      kind: compound
      trigger:
        kind: size
        limit: 200mb
      roller:
        kind: fixed_window
        base: 1
        count: 5
        pattern: "log/base-node/other.{}.log"
    encoder:
      pattern: "{d(%Y-%m-%d %H:%M:%S.%f)} [{t}] {l:5} {m}{n}"

  # An appender named "stress_test" that writes to a file with a custom pattern encoder
  stress_test:
    kind: rolling_file
    path: "log/base-node/stress_test.log"
    policy:
      kind: compound
      trigger:
        kind: size
        limit: 100mb
      roller:
        kind: fixed_window
        base: 1
        count: 10
        pattern: "log/base-node/stress_test.{}.log"
    encoder:
      pattern: "{d(%Y-%m-%d %H:%M:%S.%f)} [{t}] {l:5} {m}{n}"

# root (to base_layer)
root:
  level: trace
  appenders:
    - base_layer

loggers:
  # console output
  base_node:
    level: info
    appenders:
      - stdout
    additive: false
  # core (mainly base node)
  c:
    level: trace
    appenders:
      - core
    additive: false
  c::cs::lmdb_db::lmdb_db:
    level: trace
    appenders:
      - core
    additive: false
  c::pow::lwma_diff:
    level: debug
    appenders:
      - core
    additive: false
  c::bn::pow::sha3:
    level: debug
    appenders:
      - core
    additive: false
  tari::base_node::grpc:
    level: trace
    appenders:
      - core
    additive: false
  # base_layer (mainly wallet)
  wallet:
    level: trace
    appenders:
      - base_layer
    additive: false
  tari_mm_proxy:
    level: debug
    appenders:
      - base_layer
    additive: false
  # network
  comms:
    level: trace
    appenders:
      - network
    additive: false
  comms::noise:
    level: error
    appenders:
      - network
    additive: false
  p2p:
    level: trace
    appenders:
      - network
    additive: false
  mio:
    level: error
    appenders:
      - network
    additive: false
  yamux:
    level: error
    appenders:
      - network
    additive: false
  # other
  rustyline:
    level: error
    appenders:
      - other
    additive: false
  h2:
    level: info
    appenders:
      - other
    additive: false
  hyper:
    level: info
    appenders:
      - other
    additive: false
  tokio_util:
    level: error
    appenders:
      - other
    additive: false
  tracing:
    level: error
    appenders:
      - other
    additive: false
  # stress_test
  stress_test:
    level: debug
    appenders:
      - stress_test
    additive: false
