# A sample log configuration file for running in release mode. By default, this configuration splits up log messages to
# three destinations:
#    * Console: For log messages with level INFO and higher
#    * log/mining-node/network.log: INFO-level logs related to the comms crate. This file will be quite busy since there
#      are lots of P2P debug messages, and so this traffic is segregated from the application log messages
#    * log/mining-node/mining_node.log: Non-comms related INFO-level messages and higher are logged into this file
#    * log/mining-node/other.log: Third-party crates' messages will be logged here at an ERROR level
#
#  See https://docs.rs/log4rs/0.8.3/log4rs/encode/pattern/index.html for deciphering the log pattern. The log format
#  used in this sample configuration prints messages as:
#  timestamp [target] LEVEL message
refresh_rate: 30 seconds
appenders:
  # An appender named "stdout" that writes to stdout
  stdout:
    kind: console
    encoder:
      pattern: "{d(%Y-%m-%d %H:%M:%S.%f)} [{t}] {h({l}):5} {m}{n}"

  # An appender named "mining_node" that writes to a file with a custom pattern encoder
  mining_node:
    kind: rolling_file
    path: "log/mining-node/mining_node.log"
    policy:
      kind: compound
      trigger:
        kind: size
        limit: 200mb
      roller:
        kind: fixed_window
        base: 1
        count: 50
        pattern: "log/mining-node/mining_node.{}.log"
    encoder:
      pattern: "{d(%Y-%m-%d %H:%M:%S.%f)} [{t}] {l:5} {m}{n}"

  # An appender named "other" that writes to a file with a custom pattern encoder
  other:
    kind: rolling_file
    path: "log/mining-node/other.log"
    policy:
      kind: compound
      trigger:
        kind: size
        limit: 200mb
      roller:
        kind: fixed_window
        base: 1
        count: 5
        pattern: "log/mining-node/other.{}.log"
    encoder:
      pattern: "{d(%Y-%m-%d %H:%M:%S.%f)} [{t}] {l:5} {m}{n}"

# root (to mining_node)
root:
  level: trace
  appenders:
    - mining_node

loggers:
  # main log events
#  tari_mining_node:
#    level: debug
#    appenders:
#      - mining_node
#    additive: false
  # console output
  tari_mining_node:
    level: info
    appenders:
      - stdout
      - mining_node
    additive: false
  # other
  rustyline:
    level: error
    appenders:
      - other
    additive: false
  h2:
    level: info
    appenders:
      - other
    additive: false
  hyper:
    level: info
    appenders:
      - other
    additive: false
  tokio_util:
    level: error
    appenders:
      - other
    additive: false
  tower_buffer:
    level: error
    appenders:
      - other
    additive: false
  tonic:
    level: error
    appenders:
      - other
    additive: false
  want:
    level: error
    appenders:
      - other
    additive: false
  tracing:
    level: error
    appenders:
      - other
    additive: false
  mio:
    level: error
    appenders:
      - other
    additive: false
